<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0056FE" />
      <stop offset="100%" stop-color="#00B4FE" />
    </linearGradient>
    <style>
      .monitor-body { fill: #070f1e; stroke: #cbd5e1; stroke-width: 3; }
      .stand { fill: #cbd5e1; }
      .bar-blue { fill: url(#blueGrad); }
      .bar-muted { fill: #1e293b; }
      .grid-line { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
      .chart-line { stroke: #00B4FE; stroke-width: 2.5; stroke-linecap: round; fill: none; }
    </style>
  </defs>
  <!-- Monitor screen frame -->
  <rect x="6" y="8" width="52" height="36" rx="4" class="monitor-body" />
  <!-- Screen grid lines -->
  <line x1="6" y1="20" x2="58" y2="20" class="grid-line" />
  <line x1="6" y1="32" x2="58" y2="32" class="grid-line" />
  <!-- Charts / Data Visuals inside -->
  <!-- Bar chart bars -->
  <rect x="12" y="26" width="6" height="12" class="bar-muted" />
  <rect x="22" y="16" width="6" height="22" class="bar-blue" />
  <rect x="32" y="22" width="6" height="16" class="bar-muted" />
  <rect x="42" y="14" width="6" height="24" class="bar-blue" />
  <!-- Line chart line overlay -->
  <path d="M15,22 L25,12 L35,28 L45,10 L53,16" class="chart-line" />
  <!-- Monitor Stand -->
  <path d="M26,44 L38,44 L42,54 L22,54 Z" class="stand" />
  <rect x="28" y="44" width="8" height="6" fill="#94a3b8" />
</svg>

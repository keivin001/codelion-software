<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0056FE" />
      <stop offset="100%" stop-color="#00B4FE" />
    </linearGradient>
    <style>
      .code-line { stroke: #cbd5e1; stroke-width: 2; stroke-linecap: round; }
      .code-tag { fill: url(#blueGrad); font-family: Courier, monospace; font-weight: bold; font-size: 14px; }
      .screen-bg { fill: #070f1e; stroke: #00B4FE; stroke-width: 2; }
      .base { fill: #1e293b; }
      .indicator { fill: #00B4FE; animation: blink 1.5s infinite; }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
  </defs>
  <!-- Laptop Screen -->
  <rect x="8" y="10" width="48" height="34" rx="4" class="screen-bg" />
  <!-- Screen Contents -->
  <text x="14" y="28" class="code-tag">&lt;/&gt;</text>
  <line x1="14" y1="36" x2="38" y2="36" class="code-line" />
  <line x1="14" y1="40" x2="28" y2="40" class="code-line" />
  <circle cx="34" cy="40" r="2" class="indicator" />
  <!-- Laptop Keyboard Base -->
  <path d="M4,44 L60,44 L62,50 C62,52 60,54 58,54 L6,54 C4,54 2,52 2,50 Z" class="base" />
  <line x1="24" y1="49" x2="40" y2="49" stroke="#00B4FE" stroke-width="2" stroke-linecap="round" />
</svg>

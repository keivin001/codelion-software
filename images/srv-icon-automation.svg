<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0056FE" />
      <stop offset="100%" stop-color="#00B4FE" />
    </linearGradient>
    <style>
      .clock-rim { fill: none; stroke: #cbd5e1; stroke-width: 3; }
      .clock-hand { stroke: url(#blueGrad); stroke-width: 3; stroke-linecap: round; transform-origin: 32px 36px; animation: spinHand 8s linear infinite; }
      .bell { fill: #1e293b; stroke: #cbd5e1; stroke-width: 2; }
      .gear { fill: none; stroke: #00B4FE; stroke-width: 2; transform-origin: 32px 36px; animation: spinGear 12s linear infinite; }
      @keyframes spinHand { to { transform: rotate(360deg); } }
      @keyframes spinGear { to { transform: rotate(-360deg); } }
    </style>
  </defs>
  <!-- Bells -->
  <path d="M12,18 C12,12 22,8 22,14" class="bell" />
  <path d="M52,18 C52,12 42,8 42,14" class="bell" />
  <!-- Timer Body -->
  <circle cx="32" cy="36" r="22" fill="#070f1e" stroke="#00B4FE" stroke-width="3" />
  <circle cx="32" cy="36" r="18" class="clock-rim" />
  <!-- Rotating Gear inside -->
  <circle cx="32" cy="36" r="8" class="gear" stroke-dasharray="4 2" />
  <!-- Clock hands -->
  <line x1="32" y1="36" x2="32" y2="24" class="clock-hand" />
  <line x1="32" y1="36" x2="42" y2="36" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round" />
  <!-- Top button -->
  <rect x="28" y="8" width="8" height="4" fill="#cbd5e1" rx="1" />
</svg>

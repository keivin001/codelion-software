<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0056FE" />
      <stop offset="100%" stop-color="#00B4FE" />
    </linearGradient>
    <style>
      .node { fill: #070f1e; stroke: #00B4FE; stroke-width: 3; }
      .center-node { fill: url(#blueGrad); }
      .link-line { stroke: #cbd5e1; stroke-width: 2.5; stroke-dasharray: 4 2; animation: dash 5s linear infinite; }
      .api-text { fill: #ffffff; font-family: 'Space Grotesk', sans-serif; font-size: 8px; font-weight: 800; text-anchor: middle; }
      @keyframes dash { to { stroke-dashoffset: -20; } }
      .pulse { animation: pulseAnim 2s infinite; transform-origin: center; }
      @keyframes pulseAnim { 0%, 100% { r: 5; opacity: 0.4; } 50% { r: 9; opacity: 0.9; } }
    </style>
  </defs>
  <!-- Connection Lines -->
  <line x1="32" y1="32" x2="14" y2="18" class="link-line" />
  <line x1="32" y1="32" x2="50" y2="18" class="link-line" />
  <line x1="32" y1="32" x2="14" y2="46" class="link-line" />
  <line x1="32" y1="32" x2="50" y2="46" class="link-line" />
  <!-- Outer Nodes -->
  <circle cx="14" cy="18" r="6" class="node" />
  <circle cx="50" cy="18" r="6" class="node" />
  <circle cx="14" cy="46" r="6" class="node" />
  <circle cx="50" cy="46" r="6" class="node" />
  <!-- Glowing pulse effects on outer nodes -->
  <circle cx="14" cy="18" r="5" fill="#00B4FE" class="pulse" />
  <circle cx="50" cy="18" r="5" fill="#00B4FE" class="pulse" />
  <circle cx="14" cy="46" r="5" fill="#00B4FE" class="pulse" />
  <circle cx="50" cy="46" r="5" fill="#00B4FE" class="pulse" />
  <!-- Center Node -->
  <circle cx="32" cy="32" r="14" class="node" stroke-width="4" />
  <circle cx="32" cy="32" r="10" class="center-node" />
  <text x="32" y="35" class="api-text">API</text>
</svg>
